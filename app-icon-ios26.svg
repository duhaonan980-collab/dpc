<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- iOS 26 squircle clip path (superellipse approximation) -->
    <clipPath id="squircle">
      <path d="M 512,0
               C 232,0 0,232 0,512
               C 0,792 232,1024 512,1024
               C 792,1024 1024,792 1024,512
               C 1024,232 792,0 512,0 Z"/>
    </clipPath>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#A8D8F0"/>
      <stop offset="55%"  stop-color="#6FB8E8"/>
      <stop offset="100%" stop-color="#3A8FD0"/>
    </linearGradient>
    <!-- Glass overlay gradient -->
    <linearGradient id="glassGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="50%"  stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.18"/>
    </linearGradient>
    <!-- Lightning glow -->
    <filter id="boltGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Inner highlight -->
    <radialGradient id="hiLight" cx="50%" cy="20%" r="65%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#FFFFFF" stop-opacity="0.0"/>
    </radialGradient>
  </defs>

  <!-- Squircle background (full bleed) -->
  <g clip-path="url(#squircle)">
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>
    <!-- Soft glow blobs for liquid glass depth -->
    <circle cx="260" cy="280" r="260" fill="#FFFFFF" opacity="0.22"/>
    <circle cx="780" cy="820" r="220" fill="#1B5E9E" opacity="0.18"/>
    <!-- Glass overlay -->
    <rect width="1024" height="1024" fill="url(#glassGrad)"/>
    <!-- Inner highlight -->
    <rect width="1024" height="1024" fill="url(#hiLight)"/>
  </g>

  <!-- Squircle inner border highlight (Liquid Glass) -->
  <path d="M 512,8
           C 236,8 8,236 8,512
           C 8,788 236,1016 512,1016
           C 788,1016 1016,788 1016,512
           C 1016,236 788,8 512,8 Z"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.65" stroke-width="3"/>

  <!-- Lightning bolt: large, bold, centered. Fills ~70% of icon height -->
  <g filter="url(#boltGlow)">
    <path d="M 600,180
             L 360,560
             L 490,560
             L 420,860
             L 680,470
             L 540,470
             L 620,180 Z"
          fill="#FFFFFF"
          stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round"/>
  </g>
</svg>
